                // 按难度分桶
                const buckets = {
                    '基础': shuffle(typePool.filter(q => q.difficulty === '基础')),

                // 如果因为分桶导致数量不足，从该题型剩余池中补足

                    const alreadySelectedIds = new Set(currentTypeSelected.map(q => q.id));
                    const remainingInType = shuffle(typePool.filter(q => !alreadySelectedIds.has(q.id)));
                    selected = [...selected, ...remainingInType.slice(0, count - currentTypeSelected.length)];

                                await this.saveWrongSet(data.wrongSet);
                            }
                            if (data.seenQuestions) {
                                await this.saveSeenQuestions(new Set(data.seenQuestions));
                            }
                            if (data.examProgress) {
                                await this.saveExamProgress(data.examProgress);
                            }
                            
                            resolve('数据导入成功');
                        } catch (error) {
                            reject('数据导入失败');
                        }
                    };
                    reader.onerror = () => {
                        reject('文件读取失败');
                    };
                    reader.readAsText(file);
                });
            }
        }

        const dbManager = new DBManager();

        // 错题集相关状态
            const [wrongMode, setWrongMode] = useState(null); // 'practice', 'recite'
            const [wrongIndex, setWrongIndex] = useState(0);
            const [wrongAnswers, setWrongAnswers] = useState({});
            const [wrongSet, setWrongSet] = useState([]);
            const [seenQuestions, setSeenQuestions] = useState(new Set());
            const [examProgress, setExamProgress] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            // 加载数据
            useEffect(() => {
                const loadData = async () => {
                    setIsLoading(true);
                    try {
                        const [loadedWrongSet, loadedSeenQuestions, loadedExamProgress] = await Promise.all([
                            dbManager.getWrongSet(),
                            dbManager.getSeenQuestions(),
                            dbManager.getExamProgress()
                        ]);
                        setWrongSet(loadedWrongSet);
                        setSeenQuestions(loadedSeenQuestions);
                        setExamProgress(loadedExamProgress);
                    } catch (error) {
                        console.error('加载数据失败:', error);
                    } finally {
                        setIsLoading(false);
                    }
                };
                loadData();
            }, []);

            // 自动保存错题集
            useEffect(() => {
                if (!isLoading) {
                    dbManager.saveWrongSet(wrongSet);
                }
            }, [wrongSet, isLoading]);

            // 自动保存已刷题目
            useEffect(() => {
                if (!isLoading) {
                    dbManager.saveSeenQuestions(seenQuestions);
                }
            }, [seenQuestions, isLoading]);

            // 自动保存考试进度
            useEffect(() => {
                if (!isLoading && view === 'exam' && questions.length > 0) {
                    dbManager.saveExamProgress({
                        questions,
                        answers,
                        currentIndex,
                        time: new Date().getTime()
                    });
                }
            }, [currentIndex, answers, view, questions, isLoading]);

            const startNewExam = () => {
                const newQs = drawNewQuestions();
                setQuestions(newQs);
                setAnswers({});
                setCurrentIndex(0);
                setView('exam');
                localStorage.removeItem('cr_exam_progress');
                setExamProgress(null);

                // 更新已刷题库
                const newSeen = new Set(seenQuestions);
                newQs.forEach(q => newSeen.add(q.id));
                setSeenQuestions(newSeen);
            };

            const continueExam = () => {
                if (examProgress) {
                    setQuestions(examProgress.questions);
                    setAnswers(examProgress.answers);
                    setCurrentIndex(examProgress.currentIndex);
                    setView('exam');
                }
            };

            const handleAnswer = (index, selectedOption, isCorrect) => {
                const newAnswers = {
                    ...answers,
                    [index]: { selected: selectedOption, isCorrect, showAnalysis: true }
                };
                setAnswers(newAnswers);

                if (!isCorrect) {
                    const q = questions[index];
                    if (!wrongSet.find(wq => wq.id === q.id)) {
                        setWrongSet([...wrongSet, q]);
                    }
                }

                // 如果是对的，1秒后自动下一题 (仅限选择题)
                if (isCorrect && index < questions.length - 1) {
                    const q = questions[index];
                    if (['单选', '判断', '多选'].includes(q.type)) {
                        setTimeout(() => setCurrentIndex(index + 1), 800);
                    }
                }
            };

            const handleManualGrade = (index, isCorrect) => {
                const newAnswers = {
                    ...answers,
                    [index]: { selected: 'MANUAL', isCorrect, showAnalysis: true }
                };
                setAnswers(newAnswers);

                if (!isCorrect) {
                    const q = questions[index];
                    if (!wrongSet.find(wq => wq.id === q.id)) {
                        setWrongSet([...wrongSet, q]);
                    }
                }
                
                if (index < questions.length - 1) {
                    setTimeout(() => setCurrentIndex(index + 1), 500);
                }
            };

            const finishExam = async () => {
                setView('result');
                await dbManager.clearExamProgress();
                setExamProgress(null);
            };

            // 导出数据
            const handleExportData = async () => {
                await dbManager.exportData();
            };

            // 导入数据
            const handleImportData = (event) => {
                const file = event.target.files[0];
                if (file) {
                    dbManager.importData(file)
                        .then(message => {
                            alert(message);
                            // 重新加载数据
                            window.location.reload();
                        })
                        .catch(error => {
                            alert(error);
                        });
                }
                // 重置文件输入
                event.target.value = '';
            };

            if (view === 'home') return (
                <div className="min-h-screen flex flex-col p-6 bg-slate-50">
                    <div className="flex-1 flex flex-col justify-center items-center">
                        <div className="w-20 h-20 cr-gradient rounded-2xl flex items-center justify-center mb-6 shadow-lg">
                            <span className="text-3xl text-white font-bold">题</span>
                        </div>
                        <h1 className="text-2xl font-bold text-slate-800 mb-2">题库</h1>
                        <p className="text-slate-500 mb-10">突击冲刺，加油必过！</p>

                        <div className="w-full max-w-xs mb-10">
                            <div className="flex justify-between items-center text-xs text-slate-500 mb-1">
                                <span>刷题进度</span>
                                <button onClick={() => {if(confirm('确定重置刷题记录吗？')) setSeenQuestions(new Set())}} className="text-blue-600 font-bold">重置</button>
                            </div>
                            <div className="w-full bg-slate-200 rounded-full h-2.5">
                                <div className="bg-blue-600 h-2.5 rounded-full" style={{ width: `${(seenQuestions.size / MASTER_POOL.length) * 100}%` }}></div>
                            </div>
                            <div className="text-center text-xs text-slate-400 mt-1">
                                {seenQuestions.size} / {MASTER_POOL.length} 题 ({( (seenQuestions.size / MASTER_POOL.length) * 100).toFixed(1)}%)
                            </div>
                        </div>
                        
                        <div className="w-full space-y-4 max-w-xs">
                            <button onClick={startNewExam} className="cr-btn-blue shadow-blue-200 shadow-lg">
                                重新抽题考试
                            </button>
                            {examProgress && (
                                <button onClick={continueExam} className="w-full py-3 bg-white border-2 border-blue-600 text-blue-600 rounded-lg font-bold">
                                    继续上次考试 ({examProgress.currentIndex + 1} / {examProgress.questions.length})
                                </button>
                            )}
                            <button onClick={() => setView('wrong')} className="w-full py-3 bg-slate-200 text-slate-700 rounded-lg font-bold">
                                错题集 ({wrongSet.length})
                            </button>
                            <div className="space-y-2">
                                <button onClick={handleExportData} className="w-full py-3 bg-gray-600 text-white rounded-lg font-bold">
                                    导出数据
                                </button>
                                <label className="w-full py-3 bg-gray-600 text-white rounded-lg font-bold cursor-pointer flex items-center justify-center">
                                    导入数据
                                    <input 
                                        type="file" 
                                        accept=".json" 
                                        onChange={handleImportData} 
                                        className="hidden"
                                    />
                                </label>
                            </div>
                        </div>
                    </div>
                    <div className="text-center text-xs text-slate-400 pb-4">
                        题库总量: {MASTER_POOL.length} 题 | 当前抽题: 100 题
                    </div>
                </div>
            );

            if (view === 'exam') return (
                <div className="min-h-screen bg-white flex flex-col">
                    <div className="cr-gradient p-4 text-white flex justify-between items-center sticky top-0 z-10">
                        <button onClick={() => setView('home')} className="p-2">✕</button>
                        <div className="font-bold">第 {currentIndex + 1} / {questions.length} 题</div>
                        <div className="bg-white/20 px-3 py-1 rounded-full text-sm">
                            {questions[currentIndex]?.type}
                        </div>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-6">
                        <QuestionCard 
                            question={questions[currentIndex]} 
                            answerState={answers[currentIndex]}
                            onAnswer={(opt, correct) => handleAnswer(currentIndex, opt, correct)}
                            onManualGrade={(correct) => handleManualGrade(currentIndex, correct)}
                        />
                    </div>

                    <div className="p-4 border-t flex justify-between items-center bg-slate-50">
                        <button 
                            disabled={currentIndex === 0}
                            onClick={() => setCurrentIndex(currentIndex - 1)}
                            className={`px-6 py-2 rounded-lg font-bold ${currentIndex === 0 ? 'text-slate-300' : 'text-blue-600'}`}
                        >
                            上一题
                        </button>
                        
                        <div className="flex gap-2">
                            {currentIndex === questions.length - 1 ? (
                                <button onClick={finishExam} className="bg-green-600 text-white px-8 py-2 rounded-lg font-bold">
                                    交卷
                                </button>
                            ) : (
                                <button 
                                    onClick={() => setCurrentIndex(currentIndex + 1)}
                                    className="bg-blue-600 text-white px-8 py-2 rounded-lg font-bold"
                                >
                                    下一题
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );

            if (view === 'wrong') return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <div className="cr-gradient p-4 text-white flex items-center sticky top-0 z-10">
                        <button onClick={() => { setView('home'); setWrongMode(null); }} className="p-2 mr-2">←</button>
                        <h2 className="font-bold text-lg">错题集 ({wrongSet.length})</h2>
                        {wrongMode && (
                            <div className="ml-auto bg-white/20 px-3 py-1 rounded-full text-xs">
                                第 {wrongIndex + 1} / {wrongSet.length} 题
                            </div>
                        )}
                        {!wrongMode && (
                            <button 
                                onClick={() => { if(confirm('确定清空错题集吗？')) setWrongSet([]) }}
                                className="ml-auto text-sm bg-white/20 px-3 py-1 rounded"
                            >
                                清空
                            </button>
                        )}
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-4">
                        {wrongSet.length === 0 ? (
                            <div className="text-center py-20 text-slate-400">暂无错题，继续加油！</div>
                        ) : !wrongMode ? (
                            <div className="flex flex-col items-center justify-center h-full space-y-6">
                                <div className="text-slate-600 font-bold text-lg mb-4">请选择复习模式</div>
                                <div className="w-full max-w-xs space-y-4">
                                    <button 
                                        onClick={() => { setWrongMode('practice'); setWrongIndex(0); setWrongAnswers({}); }}
                                        className="w-full py-4 bg-white border-2 border-blue-600 text-blue-600 rounded-2xl font-bold shadow-sm"
                                    >
                                        <div className="text-lg">练习模式</div>
                                        <div className="text-xs font-normal opacity-70">隐藏答案，自主作答</div>
                                    </button>
                                    <button 
                                        onClick={() => { setWrongMode('recite'); setWrongIndex(0); }}
                                        className="w-full py-4 bg-white border-2 border-emerald-600 text-emerald-600 rounded-2xl font-bold shadow-sm"
                                    >
                                        <div className="text-lg">背题模式</div>
                                        <div className="text-xs font-normal opacity-70">直接查看答案与解析</div>
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="h-full flex flex-col">
                                <div className="flex-1 overflow-y-auto">
                                    <QuestionCard 
                                        question={wrongSet[wrongIndex]} 
                                        answerState={wrongAnswers[wrongIndex]}
                                        forceShowAnalysis={wrongMode === 'recite'}
                                        onAnswer={(opt, correct) => {
                                            const newAns = { ...wrongAnswers, [wrongIndex]: { selected: opt, isCorrect: correct, showAnalysis: true } };
                                            setWrongAnswers(newAns);
                                        }}
                                        onManualGrade={(correct) => {
                                            const newAns = { ...wrongAnswers, [wrongIndex]: { selected: 'MANUAL', isCorrect: correct, showAnalysis: true } };
                                            setWrongAnswers(newAns);
                                        }}
                                    />
                                </div>
                                
                                <div className="p-4 border-t flex justify-between items-center bg-white mt-4 rounded-xl shadow-inner">
                                    <button 
                                        disabled={wrongIndex === 0}
                                        onClick={() => setWrongIndex(wrongIndex - 1)}
                                        className={`px-6 py-2 rounded-lg font-bold ${wrongIndex === 0 ? 'text-slate-300' : 'text-blue-600'}`}
                                    >
                                        上一题
                                    </button>
                                    
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => {
                                                if (confirm('确定从错题集中移除这道题吗？')) {
                                                    const newWrong = wrongSet.filter((_, i) => i !== wrongIndex);
                                                    setWrongSet(newWrong);
                                                    if (wrongIndex >= newWrong.length && wrongIndex > 0) {
                                                        setWrongIndex(wrongIndex - 1);
                                                    }
                                                    if (newWrong.length === 0) {
                                                        setWrongMode(null);
                                                    }
                                                }
                                            }}
                                            className="bg-rose-50 text-rose-600 px-4 py-2 rounded-lg font-bold text-sm"
                                        >
                                            移除
                                        </button>
                                        
                                        {wrongIndex < wrongSet.length - 1 && (
                                            <button 
                                                onClick={() => setWrongIndex(wrongIndex + 1)}
                                                className="bg-blue-600 text-white px-8 py-2 rounded-lg font-bold"
                                            >
                                                下一题
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );

            if (view === 'result') {
                const correctCount = Object.values(answers).filter(a => a.isCorrect).length;
                const score = Math.round((correctCount / questions.length) * 100);
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 text-center">
                        <div className={`w-32 h-32 rounded-full flex items-center justify-center text-4xl font-bold mb-6 ${score >= 60 ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                            {score}
                        </div>
                        <h2 className="text-2xl font-bold mb-2">{score >= 60 ? '考试通过！' : '还需努力'}</h2>
                        <p className="text-slate-500 mb-10">共 {questions.length} 题，答对 {correctCount} 题</p>
                        <div className="w-full max-w-xs space-y-4">
                            <button onClick={startNewExam} className="cr-btn-blue">再考一次</button>
                            <button onClick={() => setView('home')} className="w-full py-3 bg-white text-slate-600 rounded-lg font-bold">返回首页</button>
                        </div>
                    </div>
                );
            }
        }

        function QuestionCard({ question, answerState, onAnswer, onManualGrade, forceShowAnalysis }) {
            const [localSelected, setLocalSelected] = useState([]);
            const [showManualResult, setShowManualResult] = useState(false);
            const [textValue, setTextValue] = useState("");

            useEffect(() => {
                setLocalSelected(answerState?.selected || []);
                setShowManualResult(!!answerState || forceShowAnalysis);
                // 切换题目时清空文本框
                setTextValue("");
            }, [question, answerState, forceShowAnalysis]);

            if (!question) return null;

            const isChoice = ['单选', '判断', '多选'].includes(question.type);
            
            // 确保判断题有选项
            const options = (question.type === '判断' && (!question.options || question.options.length === 0))
                ? ['A. 正确', 'B. 错误']
                : question.options;

            const handleOptionClick = (optLetter) => {
                if (answerState?.showAnalysis) return;

                if (question.type === '多选') {
                    const newSelected = localSelected.includes(optLetter)
                        ? localSelected.filter(l => l !== optLetter)
                        : [...localSelected, optLetter].sort();
                    setLocalSelected(newSelected);
                } else {
                    // 判断题的 answer 如果是 "正确"/"错误"，需要对应 A/B
                    let isCorrect = false;
                    if (question.type === '判断') {
                        const letterToText = { 'A': '正确', 'B': '错误' };
                        isCorrect = (letterToText[optLetter] === question.answer || optLetter === question.answer);
                    } else {
                        isCorrect = optLetter === question.answer;
                    }
                    onAnswer(optLetter, isCorrect);
                }
            };

            const submitMulti = () => {
                const myAns = localSelected.join('');
                const isCorrect = myAns === question.answer;
                onAnswer(localSelected, isCorrect);
            };

            return (
                <div className="fade-in">
                    <div className="text-lg font-bold text-slate-800 mb-6 leading-relaxed whitespace-pre-wrap">
                        {question.title}
                    </div>

                    {isChoice ? (
                        <div className="space-y-3">
                            {options.map(opt => {
                                const letter = opt.charAt(0);
                                let statusClass = "";
                                if (answerState?.showAnalysis || forceShowAnalysis) {
                                    const isCurrentOptionCorrect = question.type === '判断' 
                                        ? (letter === 'A' ? question.answer === '正确' : question.answer === '错误')
                                        : (question.answer.includes(letter));
                                    
                                    const isSelected = (answerState?.selected || []).includes(letter);

                                    if (isCurrentOptionCorrect) {
                                        statusClass = "selected-correct"; // 正确选项显示绿色
                                    } else if (isSelected) {
                                        statusClass = "selected-wrong"; // 错选选项显示红色
                                    }
                                } else if (localSelected.includes(letter)) {
                                    statusClass = "border-blue-500 bg-blue-50";
                                }

                                return (
                                    <div 
                                        key={letter}
                                        onClick={() => handleOptionClick(letter)}
                                        className={`option-item ${statusClass}`}
                                    >
                                        {opt}
                                    </div>
                                );
                            })}
                            
                            {question.type === '多选' && !answerState?.showAnalysis && (
                                <button 
                                    onClick={submitMulti}
                                    disabled={localSelected.length === 0}
                                    className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold mt-4 disabled:opacity-50"
                                >
                                    确认提交
                                </button>
                            )}
                        </div>
                    ) : (
                        <div className="space-y-4">
                            <textarea 
                                className="w-full p-4 border rounded-xl bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="请在此输入您的答案（可选，仅作练习）"
                                rows="4"
                                value={textValue}
                                onChange={(e) => setTextValue(e.target.value)}
                                disabled={showManualResult}
                            ></textarea>
                            
                            {!showManualResult ? (
                                <button 
                                    onClick={() => setShowManualResult(true)}
                                    className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold"
                                >
                                    查看答案与解析
                                </button>
                            ) : (
                                <div className="space-y-4">
                                    <div className={`p-4 rounded-xl border ${answerState ? (answerState.isCorrect ? 'bg-emerald-50 border-emerald-100' : 'bg-rose-50 border-rose-100') : (forceShowAnalysis ? 'bg-emerald-50 border-emerald-100' : 'bg-emerald-50 border-emerald-100')}`}>
                                        <div className={`font-bold mb-1 ${answerState ? (answerState.isCorrect ? 'text-emerald-700' : 'text-rose-700') : (forceShowAnalysis ? 'text-emerald-700' : 'text-emerald-700')}`}>
                                            {answerState ? (answerState.isCorrect ? '判定：答对了' : '判定：答错了') : '参考答案：'}
                                        </div>
                                        <div className={answerState ? (answerState.isCorrect ? 'text-emerald-800' : 'text-rose-800') : (forceShowAnalysis ? 'text-emerald-800' : 'text-emerald-800')}>
                                            <div className="font-bold mb-1">【标准答案】</div>
                                            <div className="whitespace-pre-wrap">{question.answer}</div>
                                        </div>
                                    </div>
                                    {!answerState && !forceShowAnalysis && (
                                        <div className="flex gap-4">
                                            <button onClick={() => onManualGrade(true)} className="flex-1 py-3 bg-emerald-500 text-white rounded-xl font-bold">答对了</button>
                                            <button onClick={() => onManualGrade(false)} className="flex-1 py-3 bg-rose-500 text-white rounded-xl font-bold">答错了</button>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}

                    {(answerState?.showAnalysis || showManualResult || forceShowAnalysis) && (
                        <div className="mt-8 pt-6 border-t fade-in">
                            <div className="flex items-center gap-2 mb-3">
                                <span className="w-1 h-5 bg-blue-600 rounded-full"></span>
                                <span className="font-bold text-slate-800">答案解析</span>
                                <span className="text-xs text-slate-400 ml-auto">难度: {question.difficulty}</span>
                            </div>
                            <div className="text-slate-600 leading-relaxed bg-slate-50 p-4 rounded-xl text-sm whitespace-pre-wrap">
                                {question.analysis || "暂无解析"}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // 移除加载屏幕
        window.addEventListener('load', () => {
            const ls = document.getElementById('loading-screen');
            if (ls) ls.style.display = 'none';
        });
    </script>
    
</body>
</html>
